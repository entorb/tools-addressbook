name: Check Code and Test Python Project

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1 # latest only

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          # here no pip cache needed, if no packages installed
          # pre-commit has its own cache
          # cache: "pip"

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest unittests
        run: |
          cp bday_mail_sender_today_config-EXAMPLE.py bday_mail_sender_today_config.py
          pip install pytest
          pytest

      - name: Cache pre-commit envs
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files
